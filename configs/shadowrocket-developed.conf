# Shadowrocket 非港澳发达地区自动 PROXY
# 用法：把 [Proxy Group] 里的 PROXY = ... 整行替换为下面这一行。
# 注意：把 <SUBSCRIPTION_NAME> 替换成当前配置里真实存在的订阅名，例如 SAKURACAT。

PROXY = url-test,<SUBSCRIPTION_NAME>,use=true,url=http://www.gstatic.com/generate_204,policy-regex-filter=^(?!.*(香港|港|HK|HKG|Hong|澳门|澳門|MO|Macau|剩余|流量|套餐|到期|重置)).*(台湾|台灣|TW|Taiwan|新加坡|SG|Singapore|日本|JP|Japan|东京|大阪|韩国|韓國|KR|Korea|首尔|Seoul|美国|US|USA|英国|UK|法国|FR|德国|DE|意大利|IT|挪威|NO|加拿大|CA|澳洲|澳大利亚|AU|荷兰|NL|瑞士|CH|新西兰|NZ),timeout=5,tolerance=100,interval=600
