# Shadowrocket 自定义代理组模板
#
# 用途：根据节点名称自定义自动代理组，例如日本自动、欧洲自动、家宽自动、IEPL 自动等。
#
# 占位符说明：
# - <GROUP_NAME>：代理组名称，例如 日本自动。
# - <SUBSCRIPTION_NAME>：Shadowrocket 中显示的订阅名称。
# - <EXCLUDE_REGEX>：排除关键词，例如香港、澳门、通知、套餐等。
# - <INCLUDE_REGEX>：纳入关键词，例如日本、JP、Japan、Tokyo 等。

<GROUP_NAME> = url-test,<SUBSCRIPTION_NAME>,use=true,url=http://www.gstatic.com/generate_204,policy-regex-filter=^(?!.*(<EXCLUDE_REGEX>)).*(<INCLUDE_REGEX>),timeout=5,tolerance=100,interval=600

# 示例：日本自动
日本自动 = url-test,<SUBSCRIPTION_NAME>,use=true,url=http://www.gstatic.com/generate_204,policy-regex-filter=^(?!.*(香港|港|HK|HKG|Hong|Hong Kong|澳门|澳門|MO|Macau|剩余|流量|套餐|到期|重置|官网|官方|通知|重要|客户端|更新|升级|旧节点)).*(日本|东京|東京|大阪|JP|Japan|Tokyo|Osaka|🇯🇵),timeout=5,tolerance=100,interval=600

# 示例：美日新自动
美日新自动 = url-test,<SUBSCRIPTION_NAME>,use=true,url=http://www.gstatic.com/generate_204,policy-regex-filter=^(?!.*(香港|港|HK|HKG|Hong|Hong Kong|澳门|澳門|MO|Macau|剩余|流量|套餐|到期|重置|官网|官方|通知|重要|客户端|更新|升级|旧节点)).*(美国|美國|US|USA|United States|America|日本|JP|Japan|东京|東京|大阪|新加坡|SG|Singapore|🇺🇸|🇯🇵|🇸🇬),timeout=5,tolerance=100,interval=600
