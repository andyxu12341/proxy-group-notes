# Shadowrocket 只美国 PROXY
# 用法：把 [Proxy Group] 里的 PROXY = ... 整行替换为下面这一行。
# 注意：把 <SUBSCRIPTION_NAME> 替换成当前配置里真实存在的订阅名，例如 SAKURACAT。

PROXY = url-test,<SUBSCRIPTION_NAME>,use=true,url=http://www.gstatic.com/generate_204,policy-regex-filter=^(?!.*(香港|港|HK|HKG|Hong|澳门|澳門|MO|Macau|剩余|流量|套餐|到期|重置)).*(美国|美國|美西|美东|美東|美中|美南|美國家宽|美国家宽|US|USA|United States|America|Los Angeles|San Jose|Seattle|New York|Dallas|Chicago|Washington|🇺🇸),timeout=5,tolerance=100,interval=600
