# Clash Verge / Mihomo：proxy-providers + 全局扩展脚本模板
#
# 用途：YAML 只维护订阅来源；代理组、rule-providers 和 rules 由 scripts/clash-verge-developed.js 自动注入。
#
# 脚本会自动读取 proxy-providers 下的所有 provider 名称，并生成：
# - proxy-groups：🌐 发达地区自动 / 🇺🇸 美国自动 / 节点选择
# - rule-providers：MetaCubeX 中国大陆域名规则集 cn
# - rules：按 MetaCubeX 官方示例风格分流；国内与大厂中国区直连，常见海外服务代理，最后交给“节点选择”兜底
#
# 注意：公开仓库中不要写入真实订阅 URL、token 或节点密码。

mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
ipv6: false

external-controller: 127.0.0.1:9090

profile:
  store-selected: true
  store-fake-ip: true

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://223.5.5.5/dns-query
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  proxy-server-nameserver:
    - 223.5.5.5
    - 119.29.29.29

proxy-providers:
  sub_a:
    type: http
    url: "SUBSCRIPTION_URL_A"
    path: ./providers/sub_a.yaml
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300

  sub_b:
    type: http
    url: "SUBSCRIPTION_URL_B"
    path: ./providers/sub_b.yaml
    interval: 86400
    health-check:
      enable: true
      url: https://www.gstatic.com/generate_204
      interval: 300
